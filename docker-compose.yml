services:

  config-server:
    image: ecobridge/config-server:1.0
    container_name: ecobridge-config-server
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: docker,native

    ports:
      - "8888:8888"

    networks:
      - ecobridge-network
      
  discovery-server:
    image: ecobridge/discovery-server:1.0
    container_name: ecobridge-discovery-server
    restart: unless-stopped
    depends_on:
      - config-server
    ports:
      - "8761:8761"
    networks:
      - ecobridge-network
    environment:
      SPRING_PROFILES_ACTIVE: docker,native

  auth-service:
    image: ecobridge/auth-service:1.0
    container_name: ecobridge-auth-service
    restart: unless-stopped
    depends_on:
      - config-server
      - discovery-server
    
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker,native
      JWT_SECRET: "1234567890123456789012345678901234567890123456789012345678901234"
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ecobridge_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: divyansh123
      # FIXED: Environment variables must be flat UPPERCASE_KEYS or standard flattened properties
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      FRONT_END_URL: "http://localhost"
      FRONT_END_SUCCESS_REDIRECT: "http://localhost/oauth/success"
      FRONT_END_FAILURE_REDIRECT: "http://localhost/oauth/failure"
    networks:
      - ecobridge-network

  waste-service:
    image: ecobridge/waste-service:1.0
    container_name: ecobridge-waste-service
    restart: unless-stopped
    depends_on:
      - config-server
      - discovery-server
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker,native
      JWT_SECRET: "1234567890123456789012345678901234567890123456789012345678901234"
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ecobridge_waste
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: divyansh123
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ecobridge-kafka:9092
    networks:
      - ecobridge-network

  recycler-service:
    image: ecobridge/recycler-service:1.0
    container_name: ecobridge-recycler-service
    restart: unless-stopped
    depends_on:
      - config-server
      - discovery-server
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker,native
      JWT_SECRET: "1234567890123456789012345678901234567890123456789012345678901234"
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ecobridge_recycler
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: divyansh123
    networks:
      - ecobridge-network

  matching-service:
    image: ecobridge/matching-service:1.0
    container_name: ecobridge-matching-service
    restart: unless-stopped
    depends_on:
      - config-server
      - discovery-server
      - redis
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker,native
      JWT_SECRET: "1234567890123456789012345678901234567890123456789012345678901234"
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ecobridge_matching
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: divyansh123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - ecobridge-network

  analytics-service:
    image: ecobridge/analytics-service:1.0
    container_name: ecobridge-analytics-service
    restart: unless-stopped
    depends_on:
      - config-server
      - discovery-server
      - redis
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ecobridge-kafka:9092
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - ecobridge-network

  redis:
    image: redis:7-alpine
    container_name: ecobridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ecobridge-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: ecobridge-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ecobridge-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@ecobridge-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - ecobridge-network

  api-gateway:
    image: ecobridge/api-gateway:1.0
    container_name: ecobridge-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - waste-service
      - recycler-service
      - matching-service
      - analytics-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ecobridge-network

  frontend:
    image: ecobridge/frontend:1.0
    container_name: ecobridge-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "80:80"
    networks:
      - ecobridge-network
volumes:
  redis-data:

networks:
  ecobridge-network:
    driver: bridge