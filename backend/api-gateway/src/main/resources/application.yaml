server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:https://ecobridge-enterprise.onrender.com
  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: auth-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: oauth-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/oauth2/**

            - id: oauth-login-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/login/oauth2/**

            - id: user-route
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/users/**

            - id: waste-route
              uri: lb://WASTE-SERVICE
              predicates:
                - Path=/api/v1/waste/**

            - id: upload-route
              uri: lb://WASTE-SERVICE
              predicates:
                - Path=/api/v1/upload/**

            - id: recycler-route
              uri: lb://RECYCLER-SERVICE
              predicates:
                - Path=/api/v1/recycler/**

            - id: matching-route
              uri: lb://MATCHING-SERVICE
              predicates:
                - Path=/api/v1/matching/**

            - id: analytics-route
              uri: lb://ANALYTICS-SERVICE
              predicates:
                - Path=/api/v1/analytics/**

            - id: notification-route
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}

management:
  endpoints:
    web:
      exposure:
        include: "*"