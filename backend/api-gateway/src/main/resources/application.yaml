server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-route
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/auth/**

          - id: user-route
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/v1/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"